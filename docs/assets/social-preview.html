<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 1200px; height: 630px; overflow: hidden; background: #0a0a1a; font-family: ui-monospace, SFMono-Regular, monospace; }
.card {
  width: 1200px; height: 630px; position: relative;
  background: #0a0a1a;
  overflow: hidden;
}
/* Pixel grid pattern */
.card::before {
  content: '';
  position: absolute; inset: 0;
  background-image:
    linear-gradient(rgba(99,102,241,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(99,102,241,0.03) 1px, transparent 1px);
  background-size: 16px 16px;
}
/* Stars */
.star {
  position: absolute; width: 2px; height: 2px; background: #818CF8; border-radius: 0;
  animation: twinkle 3s infinite alternate;
}
@keyframes twinkle { 0% { opacity: 0.2; } 100% { opacity: 0.8; } }

/* Logo area */
.logo-area {
  position: absolute; top: 80px; left: 0; right: 0;
  display: flex; flex-direction: column; align-items: center;
}
.logo-mark {
  width: 80px; height: 80px; margin-bottom: 16px;
  image-rendering: pixelated;
}
.wordmark {
  font-size: 48px; font-weight: 700; color: #E2E8F0;
  letter-spacing: 12px; text-transform: uppercase;
}
.tagline {
  font-size: 18px; color: #94A3B8; margin-top: 8px; letter-spacing: 2px;
}

/* Agents org chart */
.agents {
  position: absolute; bottom: 100px; left: 0; right: 0;
  display: flex; flex-direction: column; align-items: center; gap: 12px;
}
.agent-row {
  display: flex; gap: 24px; align-items: center; position: relative;
}
.agent {
  width: 16px; height: 16px; border-radius: 0; position: relative;
  image-rendering: pixelated;
}
.agent::after {
  content: ''; position: absolute; top: -8px; left: 50%; width: 1px; height: 8px;
  border-left: 1px dashed rgba(99,102,241,0.3);
}
.agent-row:first-child .agent::after { display: none; }

/* Connection lines */
.conn {
  position: absolute; border-top: 1px dashed rgba(99,102,241,0.2);
}

/* Footer */
.footer {
  position: absolute; bottom: 32px; left: 0; right: 0; text-align: center;
  font-size: 13px; color: #4a4a6e; letter-spacing: 3px;
}

/* Pixel agent sprites - tiny 4x4 blocks */
.px { position: absolute; width: 4px; height: 4px; }
</style>
</head>
<body>
<div class="card">
  <!-- Stars -->

  <div class="star" style="top:92px;left:890px;animation-delay:0.5s"></div>

    </svg>

    <div class="tagline">Your AI company, visualized.</div>
